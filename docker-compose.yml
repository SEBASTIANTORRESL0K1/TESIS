services:
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - ./base-de-datos:/chroma/chroma
    environment:
      - CHROMA_DB_IMPL=sqlite
      - ANONYMIZED_TELEMETRY=False
    ports:
      - "8000:8000"

  convertidor:
    build:
      context: ./convertidor-archivos
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./convertidor-archivos/outputs:/usr/src/app/outputs
    environment:
      - PORT=3002
    depends_on:
      - chromadb

  chatbot-consulta:
    build:
      context: ./chatbot-consulta
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - CHROMA_URL=http://chromadb:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DB_HOST=mysql
      - DB_USER=tesis_user
      - DB_PASSWORD=tesis_password
      - DB_NAME=tesis_db
      - JWT_SECRET=super_secret_jwt_key_12345
    depends_on:
      chromadb:
        condition: service_started
      mysql:
        condition: service_healthy

  procesador-lote:
    image: alpine:latest
    volumes:
      - ./convertidor-archivos/process_material.sh:/process.sh:ro
      - ./convertidor-archivos/inputs/primera_parcial/material:/inputs:ro
      - ./convertidor-archivos/outputs:/outputs
    depends_on:
      convertidor:
        condition: service_healthy
      chatbot-consulta:
        condition: service_started
    command: >
      sh -c "apk add --no-cache curl jq && 
             cp /process.sh /tmp/process.sh && 
             dos2unix /tmp/process.sh && 
             sh /tmp/process.sh"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - convertidor
      - chatbot-consulta

  mysql:
    image: mysql:8.0
    container_name: mysql_db_tesis
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_1234
      MYSQL_DATABASE: tesis_db
      MYSQL_USER: tesis_user
      MYSQL_PASSWORD: tesis_password
    volumes:
      - ./base-de-datos/mysql-data:/var/lib/mysql
      - ./base-de-datos/mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_1234"]
      timeout: 5s
      retries: 5
      interval: 5s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_panel
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - mysql

