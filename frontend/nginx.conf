server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el convertidor
    location /api/convertidor/ {
        rewrite ^/api/convertidor/(.*) /$1 break;
        proxy_pass http://convertidor:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Ajustes para subida de archivos grandes
        client_max_body_size 50M;
    }

    # Proxy para el chatbot-consulta
    location /api/chatbot/ {
        rewrite ^/api/chatbot/(.*) /$1 break;
        proxy_pass http://chatbot-consulta:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        client_max_body_size 50M;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
